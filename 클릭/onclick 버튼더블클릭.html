<!DOCTYPE html>
<html>
    <head>
        <script>
            function myFunction() {
                document.getElementById("demo").innerHTML = "java";
            }
        </script>
    </head>
    <body>
        <p ondblclick="myFunction()">Doubleclick</p>
        <p id="demo"></p>
    </body>
</html>
