<!DOCTYPE html>
<html>
    <head>
        <script>
            function displayDate(){
                document.getElementById("demo").innerHTML = Date()
            }
        </script>
    </head>
    <body>
        <h2>java</h2>
        <p id="demo">date time</p>
        <button type="button" onclick="displayDate()">date time</button>
    </body>
</html>
